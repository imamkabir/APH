<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APH Playground</title>

<style>
    :root {
        --bg: #f5f5f7;
        --container: #ffffff;
        --text: #1c1c1e;
        --subtext: #6e6e73;
        --editor-bg: #fbfbfd;
        --editor-border: #d2d2d7;
        --output-bg: #f2f2f7;
        --button-bg: #0071e3;
        --button-hover: #0a84ff;
    }

    body.dark {
        --bg: #1c1c1e;
        --container: #2c2c2e;
        --text: #f5f5f7;
        --subtext: #8e8e93;
        --editor-bg: #3a3a3c;
        --editor-border: #4a4a4c;
        --output-bg: #2c2c2e;
        --button-bg: #0a84ff;
        --button-hover: #409CFF;
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        transition: background 0.3s, color 0.3s;
    }

    .container {
        max-width: 1100px;
        margin: 40px auto;
        background: var(--container);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        transition: background 0.3s;
    }

    h1 {
        margin-top: 0;
        font-size: 28px;
        font-weight: 700;
    }

    .subtitle {
        font-size: 15px;
        color: var(--subtext);
        margin-bottom: 25px;
    }

    .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 20px;
    }

    select {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--editor-border);
        background: var(--editor-bg);
        color: var(--text);
        transition: all 0.25s;
        cursor: pointer;
    }

    select:focus {
        outline: none;
        border-color: var(--button-bg);
    }

    button {
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        background: var(--button-bg);
        color: white;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.25s;
    }

    button:hover {
        background: var(--button-hover);
    }

    /* Monaco-style editor */
    .editor {
        width: 100%;
        background: var(--editor-bg);
        border: 1px solid var(--editor-border);
        padding: 15px;
        height: 260px;
        border-radius: 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        color: var(--text);
        white-space: pre;
        overflow: auto;
    }

    .editor:focus {
        outline: 3px solid rgba(0,112,224,0.3);
    }

    .outputs {
        display: flex;
        gap: 20px;
        margin-top: 25px;
    }

    .output-box {
        flex: 1;
    }

    .label {
        font-weight: bold;
        margin-bottom: 6px;
        color: var(--text);
    }

    .output {
        background: var(--output-bg);
        border: 1px solid var(--editor-border);
        padding: 15px;
        min-height: 200px;
        border-radius: 10px;
        font-size: 13px;
        white-space: pre-wrap;
        font-family: "JetBrains Mono", monospace;
        color: var(--text);
    }

    .dark-toggle {
        margin-left: auto;
        cursor: pointer;
        font-size: 13px;
        color: var(--subtext);
        user-select: none;
    }

    .dark-toggle:hover {
        color: var(--button-hover);
    }

</style>
</head>

<body>

<div class="container">

    <div class="row">
        <h1 style="flex: 1;">APH Playground</h1>
        <div class="dark-toggle" onclick="toggleDark()">🌙 Dark Mode</div>
    </div>

    <div class="subtitle">Write APH or PHP. View both translations instantly — in executable PHP and pure APH (.IMAM).</div>

    <div class="row">
        <select id="lang">
            <option value="aph">APH Syntax</option>
            <option value="php">PHP Syntax</option>
        </select>

        <button onclick="runCode()">Run Code</button>
    </div>

    <div contenteditable="true" id="editor" class="editor">
        <!-- Monaco-like editor -->
    </div>

    <div class="outputs">
        <div class="output-box">
            <div class="label">PHP Output</div>
            <div class="output" id="phpOut">Waiting...</div>
        </div>

        <div class="output-box">
            <div class="label">APH Output (.IMAM)</div>
            <div class="output" id="aphOut">Waiting...</div>
        </div>
    </div>

</div>

<script>

// DARK MODE
function toggleDark() {
    document.body.classList.toggle("dark");
}

// GET CODE FROM EDITOR
function getEditorCode() {
    return document.getElementById("editor").innerText;
}

// RUN CODE
function runCode() {

    const code = getEditorCode();
    const lang = document.getElementById("lang").value;

    const form = new URLSearchParams();
    form.append("code", code);
    form.append("lang", lang);

    fetch("run.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: form.toString()
    })
    .then(res => res.json())
    .then(out => {
        document.getElementById("phpOut").textContent = out.php;
        document.getElementById("aphOut").textContent = out.aph;
    })
    .catch(err => {
        document.getElementById("phpOut").textContent = "Error running code.";
        document.getElementById("aphOut").textContent = err;
    });
}

</script>

</body>
</html>
